{% for project in projects %}
<div class="project-card" id="project-card-{{ project.id }}">
  <div class="project-card-header">
    <div class="project-icon-badge" style="color:{{ project.color }}">
      <i data-lucide="{{ project.icon|default:'folder' }}"></i>
    </div>
    <h3 class="project-name">{{ project.name }}</h3>
  </div>
  {% if project.description %}<p class="project-desc">{{ project.description }}</p>{% endif %}
</div>
{% endfor %}
