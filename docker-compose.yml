services:
  web:
    build: .
    image: task-manage:latest
    container_name: task-manage-web
    restart: unless-stopped
    env_file: .env
    volumes:
      - media_files:/app/media
    depends_on: []

  nginx:
    image: nginx:alpine
    container_name: task-manage-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_files:/app/media:ro
    depends_on:
      - web

volumes:
  media_files:
